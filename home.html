<div class="home-wrap">

    <div class="brand">

        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <path d="M4 22V6L14 14L24 6V22" stroke="#F2B544" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

    <div class="balance-label">Umumiy balans</div>

      <span id="user-display">Yuklanmoqda...</span>

  <div class="section-label">Tezkor amallar</div>

  <div class="quick-grid">
    <a href="topup.html" class="quick-card">
      <div class="quick-icon quick-icon--up">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 15.5V4.5M10 4.5L5 9.5M10 4.5L15 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span>To‘ldirish</span>
    </a>
    <a href="withdraw.html" class="quick-card">

      </div>
      <span>Yechish</span>
    </a>
    <a href="history.html" class="quick-card">
      <div class="quick-icon quick-icon--history">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 5.5V10L13 12M17.5 10A7.5 7.5 0 1 1 14 3.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M17.5 3.5V7.5H13.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span>Tarix</span>
    </a>
  </div>

  <div class="section-label">Faol investitsiyalar</div>

  <div id="active-investments-list" class="invest-list">
    <div class="empty-state" id="empty-state">
      Hozircha faol investitsiyangiz yo‘q
    </div>
  </div>

  <a href="invest.html" class="new-invest-link">
    <span>+ Yangi investitsiya yaratish</span>
  </a>

  <div class="toast" id="toast"></div>
