<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>DEXO INVEST — Kirish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="bg-glow"></div>

<div class="app">

  <!-- Logo -->
  <div class="brand">
    <div class="brand-mark">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <path d="M4 22V6L14 14L24 6V22" stroke="#F2B544" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="brand-name">DEXO<span class="brand-accent">INVEST</span></span>
  </div>

  <!-- ===================== STEP 1: WELCOME / GOOGLE LOGIN ===================== -->
  <section class="card" id="step-welcome" data-step="welcome">
    <div class="welcome-icon">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <path d="M6 30V12L18 4L30 12V30" stroke="#F2B544" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 30V20H22V30" stroke="#F2B544" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="title">Hisobingizga kiring</h1>
    <p class="subtitle">Davom etish uchun Google hisobingiz orqali tizimga kiring</p>

    <button class="btn-google" id="btn-google-signin">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M19.6 10.23C19.6 9.57 19.54 8.93 19.43 8.32H10V12.05H15.39C15.15 13.3 14.43 14.36 13.36 15.07V17.58H16.55C18.45 15.84 19.6 13.27 19.6 10.23Z" fill="#4285F4"/>
        <path d="M10 20C12.7 20 14.96 19.1 16.55 17.58L13.36 15.07C12.5 15.65 11.38 16 10 16C7.39 16 5.19 14.28 4.38 11.92H1.08V14.52C2.7 17.74 6.09 20 10 20Z" fill="#34A853"/>
        <path d="M4.38 11.92C4.17 11.31 4.05 10.66 4.05 10C4.05 9.34 4.17 8.69 4.38 8.08V5.48H1.08C0.39 6.84 0 8.37 0 10C0 11.63 0.39 13.16 1.08 14.52L4.38 11.92Z" fill="#FBBC05"/>
        <path d="M10 4C11.47 4 12.78 4.51 13.82 5.49L16.66 2.66C14.95 1.07 12.7 0 10 0C6.09 0 2.7 2.26 1.08 5.48L4.38 8.08C5.19 5.72 7.39 4 10 4Z" fill="#EA4335"/>
      </svg>
      <span class="btn-text">Google orqali kirish</span>
      <span class="btn-loader" hidden></span>
    </button>

    <p class="legal">Davom etish orqali siz <a href="#">Foydalanish shartlari</a> va <a href="#">Maxfiylik siyosati</a>ga rozilik bildirasiz</p>
  </section>

  <!-- ===================== STEP 2: BLOCKED (mintaqa cheklovi uchun zaxira) ===================== -->
  <section class="card hidden" id="step-blocked" data-step="blocked">
    <div class="blocked-icon">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="17" stroke="#EF4444" stroke-width="2.4"/>
        <path d="M11 11L29 29" stroke="#EF4444" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="title">Kirish cheklangan</h1>
    <p class="subtitle" id="blocked-message">DEXO INVEST hozircha faqat O‘zbekiston Respublikasi fuqarolari uchun mavjud.</p>
    <button class="btn-primary" id="btn-blocked-back">
      <span class="btn-text">Orqaga qaytish</span>
    </button>
  </section>

  <div class="toast" id="toast"></div>

</div>

<!-- Firebase SDK (compat) — config va init login.js ichida -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="login.js"></script>
</body>
</html>
